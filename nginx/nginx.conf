events { worker_connections 1024; }

http {
    server {
        listen 80;
        location /api/auth/ { proxy_pass http://user-service:8000/auth/; proxy_set_header Host $host; }
        location /api/users/ { proxy_pass http://user-service:8000/users/; proxy_set_header Host $host; }
        location /api/hotels/ { proxy_pass http://hotel-service:8001/hotels/; proxy_set_header Host $host; }
        location /api/bookings/ { proxy_pass http://booking-service:8002/bookings/; proxy_set_header Host $host; }
        location /api/payments/ { proxy_pass http://payment-service:8003/payments/; proxy_set_header Host $host; }
        location /health { return 200 '{"status":"ok"}'; add_header Content-Type application/json; }
    }
}
