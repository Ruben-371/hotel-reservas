version: "3.9"

services:
  postgres-users:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata-users:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d users_db"]
      interval: 10s
      retries: 5

  postgres-bookings:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bookings_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata-bookings:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d bookings_db"]
      interval: 10s
      retries: 5

  postgres-payments:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata-payments:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d payments_db"]
      interval: 10s
      retries: 5

  mongodb:
    image: mongo:7
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 5

  user-service:
    build: ./services/user-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@postgres-users:5432/users_db
      SECRET_KEY: hotel-secret-2024
    depends_on:
      postgres-users:
        condition: service_healthy
    restart: unless-stopped

  hotel-service:
    build: ./services/hotel-service
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: hotels_db
      SECRET_KEY: hotel-secret-2024
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  booking-service:
    build: ./services/booking-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://user:password@postgres-bookings:5432/bookings_db
      SECRET_KEY: hotel-secret-2024
    depends_on:
      postgres-bookings:
        condition: service_healthy
    restart: unless-stopped

  payment-service:
    build: ./services/payment-service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql://user:password@postgres-payments:5432/payments_db
      SECRET_KEY: hotel-secret-2024
    depends_on:
      postgres-payments:
        condition: service_healthy
    restart: unless-stopped

  nginx-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - hotel-service
      - booking-service
      - payment-service
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - nginx-gateway
    restart: unless-stopped

volumes:
  pgdata-users:
  pgdata-bookings:
  pgdata-payments:
  mongodata:
