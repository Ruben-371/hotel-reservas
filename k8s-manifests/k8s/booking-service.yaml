apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: hotel-reservas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      imagePullSecrets:
      - name: registry-ecommerce-registry-upv371
      containers:
      - name: booking-service
        image: registry.digitalocean.com/ecommerce-registry-upv371/booking-service:latest
        env:
        - name: DATABASE_URL
          value: postgresql://user:password@postgres-bookings:5432/bookings_db
        - name: SECRET_KEY
          value: hotel-secret-2024
        ports:
        - containerPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: hotel-reservas
spec:
  selector:
    app: booking-service
  ports:
  - port: 8002
