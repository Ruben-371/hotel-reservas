apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: hotel-reservas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      imagePullSecrets:
      - name: registry-ecommerce-registry-upv371
      containers:
      - name: user-service
        image: registry.digitalocean.com/ecommerce-registry-upv371/user-service:latest
        env:
        - name: DATABASE_URL
          value: postgresql://user:password@postgres-users:5432/users_db
        - name: SECRET_KEY
          value: hotel-secret-2024
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: hotel-reservas
spec:
  selector:
    app: user-service
  ports:
  - port: 8000
