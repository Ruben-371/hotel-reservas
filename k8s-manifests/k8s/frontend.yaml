apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: hotel-reservas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
      - name: registry-ecommerce-registry-upv371
      containers:
      - name: frontend
        image: registry.digitalocean.com/ecommerce-registry-upv371/frontend:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: hotel-reservas
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 3000
