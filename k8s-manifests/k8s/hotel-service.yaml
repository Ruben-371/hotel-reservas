apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-service
  namespace: hotel-reservas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hotel-service
  template:
    metadata:
      labels:
        app: hotel-service
    spec:
      imagePullSecrets:
      - name: registry-ecommerce-registry-upv371
      containers:
      - name: hotel-service
        image: registry.digitalocean.com/ecommerce-registry-upv371/hotel-service:latest
        env:
        - name: MONGO_URL
          value: mongodb://mongodb:27017
        - name: MONGO_DB
          value: hotels_db
        ports:
        - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: hotel-service
  namespace: hotel-reservas
spec:
  selector:
    app: hotel-service
  ports:
  - port: 8001
