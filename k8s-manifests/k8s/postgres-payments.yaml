apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-payments
  namespace: hotel-reservas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-payments
  template:
    metadata:
      labels:
        app: postgres-payments
    spec:
      containers:
      - name: postgres-payments
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: payments_db
        - name: POSTGRES_USER
          value: user
        - name: POSTGRES_PASSWORD
          value: password
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-payments
  namespace: hotel-reservas
spec:
  selector:
    app: postgres-payments
  ports:
  - port: 5432
