apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: hotel-reservas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      imagePullSecrets:
      - name: registry-ecommerce-registry-upv371
      containers:
      - name: payment-service
        image: registry.digitalocean.com/ecommerce-registry-upv371/payment-service:latest
        env:
        - name: DATABASE_URL
          value: postgresql://user:password@postgres-payments:5432/payments_db
        - name: SECRET_KEY
          value: hotel-secret-2024
        ports:
        - containerPort: 8003
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: hotel-reservas
spec:
  selector:
    app: payment-service
  ports:
  - port: 8003
